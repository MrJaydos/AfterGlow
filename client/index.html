<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover lets the canvas bleed under notches/home-indicator -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>AFTERGLOW</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* -webkit-fill-available prevents iOS Safari from mis-sizing 100vh */
    html {
      width: 100%;
      height: 100%;
      height: -webkit-fill-available;
      background: #0a0a12;
    }
    body {
      width: 100%;
      height: 100%;
      min-height: -webkit-fill-available;
      background: #0a0a12;
      overflow: hidden;
    }

    /*
     * IMPORTANT: no flex/grid here.
     * Phaser's autoCenter:CENTER_BOTH positions the canvas by setting
     * margin-top / margin-left in px.  A flex parent overrides those
     * margins and doubles the vertical offset, pushing the canvas down.
     */
    #game-container {
      width: 100%;
      height: 100%;
    }

    /* Prevent default inline gap under the canvas element */
    canvas { display: block; }

    /* Portrait hint — visible only on narrow portrait screens */
    #portrait-hint {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 6px 0;
      background: rgba(0,0,0,0.65);
      color: #00f0ff;
      font-family: monospace;
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.08em;
      pointer-events: none;
      z-index: 9999;
    }
    @media screen and (orientation: portrait) and (max-width: 768px) {
      #portrait-hint { display: block; }
    }
  </style>
</head>
<body>
  <div id="portrait-hint">⟳ ROTATE FOR FULL SCREEN</div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
